<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap Card Practice</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container">

        <div class="row">
            <div class="col-6">
                <div class="card" style="width: 100%;">
                    <img src="img/lebron.jpg" class="card-img-top" alt="...">
                    <div class="card-body">
                        <h5 class="card-title">Lebron James</h5>
                        <p class="card-text">Lebron shooting three pointers</p>
                        <a href="https://en.wikipedia.org/wiki/LeBron_James" class="btn btn-primary">Learn More</a>
                    </div>
                </div>
            </div>


            <div class="col-6">
                <div class="card" style="width: 100%;">
                    <img src="img/shaq-dunk-vs-toront-16x-bas_20_1_1286x.webp" class="card-img-top" alt="...">
                    <div class="card-body">
                        <h5 class="card-title">Shaquillie O'Neal</h5>
                        <p class="card-text">Shaquillie dunking over defenders</p>
                        <a href="https://en.wikipedia.org/wiki/Shaquille_O%27Neal" class="btn btn-primary">Learn
                            More</a>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-6">
                <div class="card" style="width: 100%;">
                    <img src="img/kobe.jpg" class="card-img-top" alt="...">
                    <div class="card-body">
                        <h5 class="card-title">Kobe Bryant</h5>
                        <p class="card-text">Kobe celebrating a score</p>
                        <a href="https://en.wikipedia.org/wiki/Kobe_Bryant" class="btn btn-primary">Learn More</a>
                    </div>
                </div>
            </div>

            <div class="col-6">
                <div class="card" style="width: 100%;">
                    <img src="img/marcus smart.jpg" class="card-img-top" alt="...">
                    <div class="card-body">
                        <h5 class="card-title">Marcus Smart</h5>
                        <p class="card-text">Marcus celebrating a defensive play</p>
                        <a href="https://en.wikipedia.org/wiki/Marcus_Smart" class="btn btn-primary">Learn More</a>
                    </div>
                </div>
            </div>




        </div>









    </div>













    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
